<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D3 Hub | Login</title>
    <script>
        (() => {
            const savedTheme = localStorage.getItem("d3-theme");
            const theme = savedTheme === "light" ? "light" : "dark";
            document.documentElement.setAttribute("data-theme", theme);
        })();
    </script>
    <link rel="stylesheet" href="/static/styles.css?v=20260323-2">
</head>
<body>
    <main class="page auth-shell">
        <section class="auth-card">
            <div class="auth-toolbar">
                <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Alternar tema">Tema claro</button>
            </div>
            <p class="section-kicker">D3 Hub</p>
            <h1 class="app-title">Entrar no ambiente interno</h1>
            <p class="topbar-copy">Acesso restrito a colaboradores autorizados. O mesmo login libera acesso à D3 Gestão e à D3 Operações conforme o perfil do usuário.</p>

            {% if flash %}
            <div class="flash flash-{{ flash.level }}">{{ flash.message }}</div>
            {% endif %}
            {% if error %}
            <div class="alert">{{ error }}</div>
            {% endif %}

            <form action="/login" method="post" class="form auth-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <label class="field">
                    <span>E-mail</span>
                    <input type="email" name="email" placeholder="voce@d3solucoes.com" required>
                </label>
                <label class="field">
                    <span>Senha</span>
                    <input type="password" name="password" placeholder="Sua senha" required>
                </label>
                <button type="submit">Entrar</button>
            </form>
        </section>
    </main>
    <script>
        const themeToggle = document.getElementById("theme-toggle");
        function syncThemeLabel() {
            const currentTheme = document.documentElement.getAttribute("data-theme") || "dark";
            themeToggle.textContent = currentTheme === "dark" ? "Tema claro" : "Tema escuro";
        }
        themeToggle.addEventListener("click", () => {
            const currentTheme = document.documentElement.getAttribute("data-theme") || "dark";
            const nextTheme = currentTheme === "dark" ? "light" : "dark";
            document.documentElement.setAttribute("data-theme", nextTheme);
            localStorage.setItem("d3-theme", nextTheme);
            syncThemeLabel();
        });
        syncThemeLabel();
    </script>
</body>
</html>
