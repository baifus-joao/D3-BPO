<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel D3 | Login</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <main class="page auth-shell">
        <section class="auth-card">
            <p class="section-kicker">Painel interno D3</p>
            <h1 class="app-title">Entrar no sistema</h1>
            <p class="topbar-copy">Acesso restrito a colaboradores autorizados. Usuários são criados e administrados pelo perfil admin.</p>

            {% if flash %}
            <div class="flash flash-{{ flash.level }}">{{ flash.message }}</div>
            {% endif %}
            {% if error %}
            <div class="alert">{{ error }}</div>
            {% endif %}

            <form action="/login" method="post" class="form auth-form">
                <label class="field">
                    <span>E-mail</span>
                    <input type="email" name="email" placeholder="voce@d3financeiro.com.br" required>
                </label>
                <label class="field">
                    <span>Senha</span>
                    <input type="password" name="password" placeholder="Sua senha" required>
                </label>
                <button type="submit">Entrar</button>
            </form>
        </section>
    </main>
</body>
</html>
